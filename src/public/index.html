<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat IA Integrator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>
            Chat IA Integrator
        </h1>

        <label for="prompt">
            Digite seu prompt:
        </label>

        <textarea 
            id="prompt"
            placeholder="Exemplo: Explique o que é SOLID."
        ></textarea>

        <button id="sendButton">
            Enviar
        </button>

        <h2>
            Resposta
        </h2>

        <div id="response">
            A resposta aparecerá aqui.
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
