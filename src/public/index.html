<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LlamaChat</title>
    <link rel="shortcut icon" href="favicon.jpg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="logo-container">
            <img 
                src="ollama.png" 
                alt="Llama logo" 
                class="llama-logo"
            >

            <h1>LlamaChat</h1>
        </div>

        <p class="subtitle">
            Converse com uma IA local utilizando Ollama e Llama 3
        </p>

        <label for="prompt">
            Seu prompt:
        </label>

        <textarea id="prompt" placeholder="Digite aqui sua pergunta para a IA..."></textarea>

        <button id="sendButton">
            Enviar
        </button>

        <h2>
            Resposta
        </h2>

        <div id="response">Ao seu dispor!</div>

        <p class="footer-info">
            Node.js • Express • Ollama • Llama 3 • Docker • GitHub Actions
        </p>
    </div>

    <script src="script.js"></script>
</body>

</html>
