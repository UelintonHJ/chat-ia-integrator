version: "3.9"

services:
  backend:
    build: .
    ports:
    - "3000:3000"
    volumes:
    - .:/app
    depends_on:
    - ollama
    environment:
    - OLLAMA_URL=http://ollama:11434

  ollama:
    image: ollama/ollama
    ports:
    - "11434:11434"
    volumes:
    - ollama_data:/root/.ollama
    command: serve

volumes:
  ollama_data:
